kind: custom
name: simple_arm
root: base_link
links:
  - name: base_link
    visual_extent: [0.1, 0.1, 0.05]
  - name: link1
    visual_extent: [0.05, 0.05, 0.3]
  - name: link2
    visual_extent: [0.05, 0.05, 0.25]
  - name: end_effector
    visual_extent: [0.04, 0.04, 0.06]
joints:
  - name: joint1
    type: revolute
    parent: base_link
    child: link1
    origin: [0.0, 0.0, 0.025]
    axis: [0, 0, 1]
    limit: [-3.14159, 3.14159]
    velocity_limit: 2.0
  - name: joint2
    type: revolute
    parent: link1
    child: link2
    origin: [0.0, 0.0, 0.3]
    axis: [0, 1, 0]
    limit: [-1.57, 1.57]
  - name: joint3
    type: fixed
    parent: link2
    child: end_effector
    origin:
      xyz: [0.0, 0.0, 0.25]
      rpy: [0.0, 0.0, 0.0]
end_effectors:
  tool: end_effector
